<!DOCTYPE html>
<html>
<head>
<title>QuickMart Boss</title>

<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js"></script>

<style>
body{font-family:Arial;margin:0;background:#f4f4f4}
nav{background:#000;color:#fff;padding:10px;display:flex;justify-content:space-between}
.container{padding:20px}
.card{background:#fff;padding:15px;margin:10px;border-radius:10px}
button{padding:10px;border:none;background:#00cc66;color:#fff;cursor:pointer}
</style>
</head>

<body>

<nav>
<h2>QuickMart Boss 🛒</h2>
<span id="user"></span>
</nav>

<div class="container">

<h3>Login</h3>
<input id="email" placeholder="Email"><br><br>
<input id="pass" type="password" placeholder="Password"><br><br>
<button onclick="signup()">Signup</button>
<button onclick="login()">Login</button>

<hr>

<h3>Products</h3>

<div class="card">
Rice ₹60 <button onclick="add('Rice',60)">Add</button>
</div>

<div class="card">
Sugar ₹50 <button onclick="add('Sugar',50)">Add</button>
</div>

<div class="card">
Oil ₹120 <button onclick="add('Oil',120)">Add</button>
</div>

<hr>

<h3>Cart</h3>
<p id="cart"></p>
<p>Total: ₹<span id="total">0</span></p>

<button onclick="order()">Place Order</button>

</div>

<script>
const firebaseConfig = {
  apiKey: "PASTE",
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

let cart = [];
let total = 0;
let userEmail = "";

// Signup
function signup(){
  let e = email.value;
  let p = pass.value;
  auth.createUserWithEmailAndPassword(e,p)
  .then(()=>alert("Signup Success"))
  .catch(err=>alert(err.message));
}

// Login
function login(){
  let e = email.value;
  let p = pass.value;
  auth.signInWithEmailAndPassword(e,p)
  .then(user=>{
    userEmail = user.user.email;
    document.getElementById("user").innerText = userEmail;
    alert("Login Success");
  })
  .catch(err=>alert(err.message));
}

// Add to cart
function add(name,price){
  cart.push(name);
  total += price;
  document.getElementById("cart").innerText = cart.join(", ");
  document.getElementById("total").innerText = total;
}

// Place order
function order(){
  if(!userEmail){
    alert("Login first");
    return;
  }

  db.collection("orders").add({
    user: userEmail,
    items: cart,
    total: total,
    time: new Date()
  })
  .then(()=>{
    alert("Order Placed 🔥");
    window.open("https://wa.me/91XXXXXXXXXX?text=Order:"+cart.join(",")+" Total ₹"+total);
  });
}
</script>

</body>
</html>
