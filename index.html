<!DOCTYPE html>
<html>
<head>
<title>QuickMart Pro</title>

<style>
body{margin:0;font-family:Arial;background:#f4f4f4}

/* Navbar */
nav{
  background:#111;
  color:white;
  padding:15px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

nav h2{color:#00ffcc;margin:0}

.cart{
  background:#00ffcc;
  color:black;
  padding:5px 10px;
  border-radius:5px;
}

/* Hero */
.hero{
  text-align:center;
  padding:40px;
  background:linear-gradient(to right,#00ffcc,#00ccff);
}

/* Products */
.products{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:20px;
  padding:20px;
}

.card{
  background:white;
  padding:20px;
  width:220px;
  border-radius:10px;
  text-align:center;
  box-shadow:0 0 10px rgba(0,0,0,0.1);
}

button{
  background:#00cc66;
  color:white;
  border:none;
  padding:10px;
  cursor:pointer;
}

button:hover{background:#00994d}

/* Cart Box */
.cart-box{
  position:fixed;
  bottom:10px;
  right:10px;
  background:white;
  padding:15px;
  border-radius:10px;
  box-shadow:0 0 10px rgba(0,0,0,0.2);
}
</style>

</head>

<body>

<nav>
  <h2>QuickMart Pro 🛒</h2>
  <div class="cart">Cart: <span id="count">0</span></div>
</nav>

<div class="hero">
  <h1>Welcome to QuickMart 🚀</h1>
  <p>Smart Shopping Experience</p>
</div>

<div class="products">

  <div class="card">
    <h3>Rice</h3>
    <p>₹60</p>
    <button onclick="add(60,'Rice')">Add to Cart</button>
  </div>

  <div class="card">
    <h3>Sugar</h3>
    <p>₹50</p>
    <button onclick="add(50,'Sugar')">Add to Cart</button>
  </div>

  <div class="card">
    <h3>Oil</h3>
    <p>₹120</p>
    <button onclick="add(120,'Oil')">Add to Cart</button>
  </div>

</div>

<div class="cart-box">
  <p>Total: ₹<span id="total">0</span></p>
  <button onclick="order()">Order on WhatsApp</button>
</div>

<script>
let count=0;
let total=0;
let items="";

function add(price,name){
  count++;
  total+=price;
  items += name + ", ";
  document.getElementById("count").innerText=count;
  document.getElementById("total").innerText=total;
}

function order(){
  let msg = "Order: " + items + " Total ₹" + total;
  let url = "https://wa.me/91XXXXXXXXXX?text=" + encodeURIComponent(msg);
  window.open(url);
}
</script>

</body>
</html>
