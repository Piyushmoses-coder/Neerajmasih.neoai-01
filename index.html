<!DOCTYPE html>
<html>
<head>
<title>QuickMart Ultra</title>

<style>
body{margin:0;font-family:Arial;background:#f4f4f4;transition:0.3s}
.dark{background:#111;color:white}

/* Navbar */
nav{
  background:#000;
  color:white;
  padding:15px;
  display:flex;
  justify-content:space-between;
}

button{cursor:pointer}

/* Products */
.products{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:20px;
  padding:20px;
}

.card{
  background:white;
  padding:15px;
  width:220px;
  border-radius:10px;
  text-align:center;
}

.dark .card{background:#222;color:white}

img{width:100%;border-radius:10px}

/* Cart */
.cart-box{
  position:fixed;
  bottom:10px;
  right:10px;
  background:white;
  padding:15px;
  border-radius:10px;
}

.dark .cart-box{background:#333}
</style>

</head>

<body>

<nav>
  <h2>QuickMart Ultra 🛒</h2>
  <div>
    <button onclick="toggleDark()">🌙</button>
    <span>Cart: <span id="count">0</span></span>
  </div>
</nav>

<div class="products">

<div class="card">
<img src="https://via.placeholder.com/200">
<h3>Rice</h3>
<p>₹60</p>
<button onclick="add(60,'Rice')">Add</button>
</div>

<div class="card">
<img src="https://via.placeholder.com/200">
<h3>Sugar</h3>
<p>₹50</p>
<button onclick="add(50,'Sugar')">Add</button>
</div>

<div class="card">
<img src="https://via.placeholder.com/200">
<h3>Oil</h3>
<p>₹120</p>
<button onclick="add(120,'Oil')">Add</button>
</div>

</div>

<div class="cart-box">
<p>Total: ₹<span id="total">0</span></p>
<button onclick="order()">Order</button>
</div>

<script>
let count = localStorage.getItem("count") || 0;
let total = localStorage.getItem("total") || 0;
let items = localStorage.getItem("items") || "";

document.getElementById("count").innerText = count;
document.getElementById("total").innerText = total;

function add(price,name){
  count++;
  total = Number(total) + price;
  items += name + ", ";
  
  localStorage.setItem("count",count);
  localStorage.setItem("total",total);
  localStorage.setItem("items",items);

  document.getElementById("count").innerText=count;
  document.getElementById("total").innerText=total;
}

function order(){
  let msg = "Order: " + items + " Total ₹" + total;
  window.open("https://wa.me/91XXXXXXXXXX?text=" + encodeURIComponent(msg));
}

function toggleDark(){
  document.body.classList.toggle("dark");
}
</script>

</body>
</html>
